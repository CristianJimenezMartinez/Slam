<div class="auth-container">
  <div class="auth-card">
    <app-loading-spinner *ngIf="loading"></app-loading-spinner>
    <h1 *ngIf="!loading">Crear cuenta</h1>
    <p class="success" *ngIf="successMessage && !loading">{{ successMessage }}</p>
    <form *ngIf="!loading" [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" placeholder="tu@email.com" />
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input id="password" type="password" formControlName="password" placeholder="Mínimo 6 caracteres" />
      </div>
      <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
      <p class="success" *ngIf="successMessage">{{ successMessage }}</p>
      <button type="submit" [disabled]="loading">
        {{ loading ? 'Cargando...' : 'Crear Cuenta' }}
      </button>
    </form>
    <div class="auth-links">
      <a routerLink="/auth/login">¿Ya tienes cuenta? Inicia sesión</a>
    </div>
  </div>
</div>
