<div class="auth-container">
  <div class="auth-card">
    <app-loading-spinner *ngIf="loading"></app-loading-spinner>
    <h1 *ngIf="!loading">Iniciar sesión</h1>
    <form *ngIf="!loading" [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" placeholder="tu@email.com" />
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input id="password" type="password" formControlName="password" placeholder="••••••••" />
      </div>
      <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
      <button type="submit" [disabled]="loading">
        {{ loading ? 'Cargando...' : 'Entrar' }}
      </button>
    </form>
    <!-- Enlaces ocultos por seguridad -->
    <!-- <div class="auth-links">
      <a routerLink="/auth/forgot-password">¿Olvidaste tu contraseña?</a>
      <a routerLink="/auth/register">Crear cuenta</a>
    </div> -->
  </div>
</div>
