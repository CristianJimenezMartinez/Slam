<div class="event-form-modal">
  <app-loading-spinner *ngIf="loading"></app-loading-spinner>

  <form *ngIf="!loading" [formGroup]="eventForm" (ngSubmit)="onSubmit()">
    <div class="form-grid">
      <div class="section info-section">
        <div class="section-card">
          <h2>Información y Estilo</h2>
          <app-event-basic-info [parentForm]="eventForm"></app-event-basic-info>
          
          <div class="divider"></div>
          
          <h3>Paleta de Colores</h3>
          <app-event-theme [parentForm]="eventForm"></app-event-theme>

          <div class="divider"></div>

          <h3>Identidad Visual</h3>
          <app-event-media 
            [cartelPreview]="cartelPreview" 
            [existingCarteles]="existingCarteles"
            (fileSelected)="onFileSelected($event)"
            (removeCartel)="onRemoveCartel()"
            (selectExisting)="selectExistingCartel($event)">
          </app-event-media>
        </div>
      </div>

      <div class="section participants-section">
        <div class="section-card">
          <app-event-participants 
            [parentForm]="eventForm"
            (add)="addParticipante()"
            (remove)="removeParticipante($event)">
          </app-event-participants>
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-secondary" (click)="cancel.emit()">Cancelar</button>
      <button type="submit" class="btn-primary-glow" [disabled]="loading">
        {{ loading ? 'Guardando...' : 'Guardar Cambios' }}
      </button>
    </div>
  </form>
</div>
