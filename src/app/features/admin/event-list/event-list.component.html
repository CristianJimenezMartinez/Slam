<app-loading-spinner *ngIf="loading"></app-loading-spinner>

<ng-container *ngIf="eventos$ | async as res">
  <div class="event-grid" *ngIf="!loading">
    <div class="no-events" *ngIf="res.data.length === 0">
      <p>No hay eventos registrados en esta sección.</p>
    </div>
  <div class="event-card" *ngFor="let evento of res.data">
    <div class="event-info">
      <h3>{{ evento.nombre }}</h3>
      <p>{{ evento.fecha | date:'short' }}</p>
      <div style="display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap;">
        <span class="status-badge" [class.active]="evento.activo" style="font-size: 0.75rem; padding: 3px 10px; border-radius: 20px;">
          {{ evento.activo ? '⭐ EN PORTADA' : 'Oculto' }}
        </span>
        <span class="status-badge" *ngIf="isEventLocked(evento)" style="background: #222; color: #888; border: 1px solid #444; font-size: 0.75rem; padding: 3px 10px; border-radius: 20px;">
          📁 HISTORIAL
        </span>
        <span class="status-badge" *ngIf="!isEventLocked(evento)" style="background: rgba(146, 211, 66, 0.2); color: var(--neon-green); border: 1px solid var(--neon-green); font-size: 0.75rem; padding: 3px 10px; border-radius: 20px;">
          📅 PRÓXIMO
        </span>
        <span class="status-badge" *ngIf="evento.votacion_activa" style="background: #ff0055; color: white; font-size: 0.75rem; padding: 3px 10px; border-radius: 20px;">
          🔥 VOTOS ABIERTOS
        </span>
      </div>
    </div>
    <div class="event-actions" style="display: flex; flex-direction: column; gap: 5px;">
      <button class="btn-icon" [class.active]="evento.activo" (click)="toggleActivo(evento)" style="width: 100%; border-radius: 4px; padding: 5px; font-size: 0.9rem;">
        {{ evento.activo ? 'Quitar Portada' : 'Poner en Portada' }}
      </button>
      
      <ng-container *ngIf="!isEventLocked(evento)">
        <button class="btn-icon" [ngStyle]="{'background': evento.votacion_activa ? '#ff0055' : 'transparent', 'color': evento.votacion_activa ? 'white' : '#ff0055', 'border': '1px solid #ff0055'}" (click)="toggleVotacion(evento)" style="width: 100%; border-radius: 4px; padding: 5px; font-size: 0.9rem;">
          {{ evento.votacion_activa ? 'Cerrar Votos' : 'Abrir Votos' }}
        </button>
        <div style="display: flex; gap: 5px; margin-top: 5px;">
          <button (click)="evento.votacion_activa ? controlLive.emit() : edit.emit(evento)" style="flex: 1; padding: 5px; font-size: 0.9rem;" [ngClass]="{'btn-primary-glow': evento.votacion_activa}">
            {{ evento.votacion_activa ? '🔴 Controlar Directo' : 'Editar' }}
          </button>
          <button class="btn-danger" (click)="deleteEvento(evento.id)" style="flex: 1; padding: 5px; font-size: 0.9rem;">Eliminar</button>
        </div>
      </ng-container>

      <div *ngIf="isEventLocked(evento)" style="text-align: center; color: #888; font-size: 0.85rem; padding: 10px 0; border: 1px dashed #444; border-radius: 4px; margin-top: 5px;">
        🔒 Evento finalizado. Modificaciones bloqueadas para proteger el archivo.
      </div>
    </div>
  </div>
</div>
