<div class="dashboard-wrapper">
  <div class="dashboard-container">
    <app-admin-header 
      [userEmail]="(auth.session$ | async)?.user?.email || null" 
      (logout)="logout()">
    </app-admin-header>

    <app-admin-tabs 
      [activeTab]="activeTab" 
      (tabChange)="setTab($event)" 
      (newEvent)="openModal()">
    </app-admin-tabs>

    <main class="dashboard-content">
      <!-- VISTA EN VIVO (FASE 4) -->
      <section *ngIf="activeTab === 'live'" class="tab-view fade-in">
        <app-live-control></app-live-control>
      </section>

      <!-- VISTA DE EVENTOS (PROXIMOS Y ANTERIORES) -->
      <section *ngIf="activeTab === 'eventos' || activeTab === 'anteriores'" class="tab-view fade-in">
        <app-event-list #eventList [mode]="listMode" (edit)="openModal($event)" (controlLive)="setTab('live')"></app-event-list>
      </section>

      <!-- VISTA DE TEMPORADA -->
      <section *ngIf="activeTab === 'temporada'" class="tab-view fade-in">
        <app-cronograma-list></app-cronograma-list>
      </section>
    </main>
  </div>
</div>

<!-- MODAL DE EVENTO -->
<app-modal *ngIf="isModalOpen" [title]="selectedEventId ? 'Editar Evento' : 'Nuevo Evento'" (close)="closeModal()">
  <app-event-detail 
    [eventId]="selectedEventId" 
    (saved)="closeModal(); eventList.loadEventos()" 
    (cancel)="closeModal()">
  </app-event-detail>
</app-modal>
