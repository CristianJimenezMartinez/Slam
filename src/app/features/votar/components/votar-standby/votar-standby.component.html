<!-- No hay evento -->
<div class="status-box" *ngIf="!evento">
  <div class="empty-icon">📢</div>
  <h2>¡NO HAY MICROS ABIERTOS!</h2>
  <p>Parece que no hay ningún evento programado actualmente.</p>
  <button routerLink="/" class="btn-primary">Volver a la Portada</button>
</div>

<!-- Evento existe, pero votaciones cerradas -->
<div class="status-box locked" *ngIf="evento && !evento.votacion_activa">
  <div class="empty-icon">⏳</div>
  <h2 class="purple-glow">{{ evento.nombre }}</h2>
  <p>Votaciones cerradas. Gracias por participar.</p>
  <button routerLink="/" class="btn-primary" style="margin-top: 2rem;">Volver a la Portada</button>
</div>

<!-- Votación activa, pero sin poeta seleccionado (Esperando) -->
<div class="status-box waiting" *ngIf="evento && evento.votacion_activa && !poetaActivo">
  <div class="pulse-ring">
    <div class="icon">🎙️</div>
  </div>
  <h2>Esperando al poeta...</h2>
  <p>Escucha con atención. Pronto podrás votar.</p>
</div>
