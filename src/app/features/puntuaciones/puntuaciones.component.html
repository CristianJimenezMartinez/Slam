<div class="proyector-container">
  
  <!-- Cargando -->
  <app-loading-spinner *ngIf="loading"></app-loading-spinner>

  <div class="content" *ngIf="!loading && evento">
    
    <!-- Modo Activo: Mostrar Puntuaciones (Vibe/Sintonía Colectiva) -->
    <div class="live-ranking" *ngIf="mostrarResultados && resultados.length > 0">
      <header class="proyector-header">
        <h1 class="glow-text">{{ evento.nombre }}</h1>
        <p class="subtitle" style="margin-bottom: 0.3rem;">
          {{ rondaActual === 1 ? '🔥 Ronda de Demostración: La Quema' : rondaActual === 2 ? '📍 Ronda 1: Clasificatoria' : '🏆 Ronda 2: ¡GRAN FINAL!' }}
        </p>
        <p class="vibe-title">Sintonía del Público</p>
      </header>

      <!-- Subcomponente Podio (3 primeros) -->
      <app-proyector-podium [resultados]="resultados"></app-proyector-podium>

      <!-- Línea Divisoria Premium -->
      <div class="divider" *ngIf="resultados.length > 3"></div>

      <!-- Subcomponente Resto de Poetas en 3 columnas (recibe del 4º en adelante) -->
      <app-proyector-vibe-list [resultados]="resultados.slice(3)"></app-proyector-vibe-list>
    </div>

    <!-- Modo Oculto / Transición / Standby -->
    <div class="standby-wrapper" *ngIf="!mostrarResultados || resultados.length === 0">
      
      <!-- Subcomponente Revelación de Finalistas (Ronda 3 sin votos aún) -->
      <app-proyector-finalists-reveal 
        *ngIf="rondaActual === 3 && resultados.length === 0 && finalistas.length > 0; else regularStandby"
        [finalistas]="finalistas">
      </app-proyector-finalists-reveal>

      <!-- Subcomponente Standby Regular -->
      <ng-template #regularStandby>
        <app-proyector-standby [evento]="evento" [qrCodeUrl]="qrCodeUrl"></app-proyector-standby>
      </ng-template>
    </div>

  </div>

  <div class="no-event" *ngIf="!loading && !evento">
    <h2>No hay ningún evento activo en directo.</h2>
  </div>

</div>
