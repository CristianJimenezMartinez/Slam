<main class="landing-main">
  
  <!-- MODO CARGANDO -->
  <app-loading-spinner *ngIf="loading" [fullScreen]="true"></app-loading-spinner>

  <ng-container *ngIf="!loading">
    
    <!-- MODO EVENTO INMINENTE (<= 7 días) -->
    <app-hero-event 
      *ngIf="esEventoInminente && evento"
      [evento]="evento"
      [participantCount]="participantes.length">
    </app-hero-event>

    <!-- MODO TEMPORADA / ESPERA (> 7 días) -->
    <app-hero-season
      *ngIf="!esEventoInminente"
      [edicionTexto]="edicionTexto"
      [currentYear]="currentYear"
      [urlPaseTemporada]="urlPaseTemporada"
      [fotoTemporada]="fotoTemporada"
      (scrollRequest)="scrollToSlider()">
    </app-hero-season>

    <!-- SLIDER DE ENTRADAS (Solo en Modo Temporada o si no hay evento inminente) -->
    <app-upcoming-slider
      *ngIf="!esEventoInminente && proximosCronograma.length > 0"
      [eventos]="proximosCronograma"
      [fotoTemporada]="fotoTemporada">
    </app-upcoming-slider>

    <!-- SECCIÓN DE PARTICIPANTES (Solo en Modo Evento) -->
    <app-participants-grid
      *ngIf="esEventoInminente && participantes.length > 0"
      [participantes]="participantes"
      [evento]="evento">
    </app-participants-grid>

    <!-- PRÓXIMAS FECHAS (Solo visible si hay evento inminente) -->
    <app-upcoming-dates
      *ngIf="esEventoInminente && proximosCronograma.length > 1"
      [eventos]="proximosCronograma.slice(1)">
    </app-upcoming-dates>

  </ng-container>
</main>
