<section class="section participants-section">
  <div class="container">
    
    <div class="event-staff" *ngIf="evento">
      <div class="staff-card" *ngIf="evento.presentador">
        <span class="staff-label">Presenta</span>
        <h3>{{ evento.presentador }}</h3>
      </div>
      <div class="staff-card" *ngIf="evento.artista_invitado">
        <span class="staff-label">Artista Invitado</span>
        <h3>{{ evento.artista_invitado }}</h3>
      </div>
    </div>

    <h2 class="section-title">Poetas</h2>
    <div class="poetas-grid">
      <div class="poeta-card" *ngFor="let p of participantes">
        <!-- Comentada la foto para el futuro
        <div class="poeta-img">
          <img [src]="p.foto_url || 'assets/default-avatar.jpg'" [alt]="p.nombre">
        </div>
        -->
        <h3>{{ p.nombre }}</h3>
      </div>
    </div>
  </div>
</section>
