<section class="upcoming-events-section highlight" id="season-slider">
  <div class="container">
    <div class="season-slider-wrapper">
      <div class="slider-header">
        <h2>Disponibilidad de Entradas</h2>
        <button routerLink="/calendario" class="btn-text">Calendario Completo →</button>
      </div>
      
      <div class="season-slider">
        <div class="slider-item" *ngFor="let ev of eventos">
          <div class="event-card ticket-style">
            <div class="card-date" [style.background-image]="fotoTemporada ? 'url(' + fotoTemporada + ')' : 'none'">
              <div class="overlay"></div>
              <div class="ticket-cut"></div>
              <span class="d">{{ ev.fecha | date:'dd' }}</span>
              <span class="m">{{ ev.fecha | date:'MMM' | uppercase }}</span>
            </div>
            <div class="card-body">
              <div class="event-info">
                <h3>{{ ev.nombre }}</h3>
                <p class="location"><span class="icon">📍</span> {{ ev.ubicacion || 'Las Cigarreras' }}</p>
              </div>
              <a *ngIf="ev.url_entradas" [href]="ev.url_entradas" target="_blank" class="btn-buy-massive">
                <span>Entradas</span>
                <small>Sede Alicante</small>
              </a>
            </div>
          </div>
        </div>

        <div class="slider-item">
          <div class="event-card view-more" routerLink="/calendario">
            <div class="card-body">
              <span class="icon">📅</span>
              <h3>Calendario Completo</h3>
              <p>Ver todas las fechas</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
