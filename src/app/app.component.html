<header class="global-header">
  <div class="logo-container" routerLink="/">
    <img src="assets/images/logo.png" alt="Slam Logo" class="brand-logo">
  </div>
  
  <button class="mobile-toggle" (click)="toggleMenu()">
    <span *ngIf="!isMenuOpen">☰</span>
    <span *ngIf="isMenuOpen">✕</span>
  </button>

  <nav [class.open]="isMenuOpen">
    <a routerLink="/" [routerLinkActiveOptions]="{exact: true}" routerLinkActive="active" (click)="closeMenu()">Inicio</a>
    <a routerLink="/votar" routerLinkActive="active" (click)="closeMenu()">Votar</a>
    <a routerLink="/cantera" routerLinkActive="active" (click)="closeMenu()">Cantera</a>
    <a routerLink="/calendario" routerLinkActive="active" (click)="closeMenu()">Calendario</a>
    <a routerLink="/admin" routerLinkActive="active" (click)="closeMenu()" class="desktop-only">Login</a>
    <a *ngIf="auth.session$ | async" (click)="logout()" class="btn-logout desktop-only">Salir</a>
  </nav>
</header>

<main>
  <router-outlet></router-outlet>
</main>

<app-footer></app-footer>
